<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Ôn Tập Trắc Nghiệm</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="dashboard-screen" class="dashboard-container">
    <h2>Combo đề thi</h2>
    
    <div class="category-block">
      <div class="category-header">
        <span>KHO ĐỀ THI TRẮC NGHIỆM</span>
        <span class="toggle-icon">-</span>
      </div>
      <table class="dashboard-table">
        <thead>
          <tr>
            <th class="col-stt">STT</th>
            <th>Tên Đề Thi</th>
            <th class="col-time">Thời gian</th>
            <th class="col-action">Hành động</th>
          </tr>
        </thead>
        <tbody id="quiz-list-tbody">
          </tbody>
      </table>
    </div>
  </div>

  <div id="quiz-container" class="quiz-container hidden">
    
    <aside class="sidebar">
      <h3 class="sidebar-title">Câu hỏi</h3>
      <div class="question-grid" id="question-grid">
        </div>
      
      <div class="sidebar-actions">
        <button class="btn-submit" id="btn-submit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          Nộp bài
        </button>
        <div class="timer" id="timer">00:00</div>
      </div>
    </aside>

    <main class="main-content">
      <h1 class="quiz-title">Tiêu đề bài kiểm tra</h1>
      <div id="quiz-content">
        </div>
    </main>

  </div>

  <div id="result-screen" class="result-screen hidden">
    <div class="result-content">
      <div class="trophy-icon">🏆</div>
      <h2>Bạn đã hoàn thành bài thi</h2>
      
      <h1 class="score-display"><span id="final-score">0</span>/10 Điểm</h1>
      <p class="status-text" id="final-status">(Không đạt)</p>
      
      <div class="stats-row">
        <span class="stat correct">✔ Đúng: <strong id="stat-correct">0</strong></span>
        <span class="stat incorrect">✖ Sai: <strong id="stat-incorrect">0</strong></span>
        <span class="stat skipped">❕ Bỏ qua: <strong id="stat-skipped">0</strong></span>
      </div>
      
      <p class="time-taken">Thời gian làm bài : <strong id="time-taken-text">0 phút 0 giây</strong></p>
      
      <div class="action-buttons">
        <button class="btn-result" id="btn-view-result">Kết quả</button>
        <button class="btn-rank" id="btn-view-rank">Xem xếp hạng</button>
      </div>
      <div class="retry-action">
        <button class="btn-retry" id="btn-retry">↻ Thi lại</button>
      </div>
    </div>
  </div>

  <div id="rank-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <span class="close-modal" id="close-rank-modal">&times;</span>
      <h2 style="color: #17a2b8; margin-top: 0;">Bảng Xếp Hạng 🏆</h2>
      <h3 id="rank-quiz-title" style="font-size: 14px; color: #666; margin-bottom: 20px;"></h3>
      
      <table class="dashboard-table">
        <thead>
          <tr>
            <th style="text-align: center; width: 15%;">Hạng</th>
            <th>Họ Tên</th>
            <th style="text-align: center; width: 20%;">Điểm</th>
            <th style="text-align: center; width: 25%;">Thời gian</th>
          </tr>
        </thead>
        <tbody id="rank-tbody">
          </tbody>
      </table>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
